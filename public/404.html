<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>PlayMotion Events</title>
  <!--
    GitHub Pages does not support client-side routing out of the box.
    This redirect script (the "spa-github-pages" trick) forwards any
    direct URL (e.g. /playmotion-events/products) to index.html while
    preserving the path, so React Router can take over correctly.
    See: https://github.com/rafgraph/spa-github-pages
  -->
  <script type="text/javascript">
    var pathSegmentsToKeep = 1; // keeps the "/playmotion-events" base path
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
</body>
</html>
